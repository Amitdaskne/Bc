<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bhikharam Chandmal Admin Login</title>
  <!-- Google Fonts Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#7d0000',
            secondary: '#ffd54a',
            bgsoft: '#f7f4ec',
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bgsoft font-sans min-h-screen flex flex-col justify-between text-slate-800">
  
  <div class="flex-1 flex flex-col items-center justify-center p-4">
    <!-- Card Container -->
    <div class="bg-white rounded-3xl shadow-xl border border-rose-950/5 w-full max-w-md p-8 relative overflow-hidden">
      <!-- Decorative Backdrop Element -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#ffd54a]/20 rounded-full blur-2xl"></div>
      <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-[#7d0000]/5 rounded-full blur-2xl"></div>
      
      <!-- Brand Logo / Header -->
      <div class="text-center mb-8 relative z-10">
        <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-4 border border-secondary shadow-lg">
          <i data-lucide="shield-check" class="text-secondary w-8 h-8"></i>
        </div>
        <h1 class="text-xl font-bold text-primary tracking-wide leading-tight">BHIKHARAM CHANDMAL</h1>
        <p class="text-xs font-semibold text-secondary tracking-widest mt-1">ORDER MANAGEMENT SYSTEM</p>
        <div class="inline-block mt-3 px-3 py-1 bg-amber-50 text-primary border border-amber-200 rounded-full text-[10px] font-bold uppercase tracking-wider">
          Admin Portal
        </div>
      </div>

      <!-- Login Form -->
      <form id="admin-login-form" class="space-y-5 relative z-10">
        <!-- Email Field (Readonly) -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Admin Email</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
              <i data-lucide="mail" class="text-slate-400 w-5 h-5"></i>
            </span>
            <input 
              type="email" 
              id="admin-email" 
              value="amitdaskishanganj@gmail.com" 
              readonly 
              class="w-full pl-10 pr-3 py-3 bg-slate-100 border border-slate-200 rounded-2xl text-slate-500 font-medium text-sm focus:outline-none cursor-not-allowed select-none"
            >
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
              <i data-lucide="lock" class="text-slate-400 w-5 h-5"></i>
            </span>
            <input 
              type="password" 
              id="admin-password" 
              placeholder="Enter your admin password" 
              required
              class="w-full pl-10 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-slate-800 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white outline-none transition-all duration-200"
            >
            <button 
              type="button" 
              id="toggle-password" 
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none"
            >
              <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button 
          type="submit" 
          class="w-full bg-primary hover:bg-red-950 active:scale-[0.98] text-white py-3.5 px-4 rounded-2xl font-semibold shadow-md hover:shadow-lg transition-all duration-200 flex items-center justify-center gap-2 mt-2"
        >
          <span>Sign In as Admin</span>
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>

        <div class="border-t border-slate-100 pt-5 text-center mt-4">
          <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-2">Representative Portal</p>
          <a 
            href="user_login.html"
            class="w-full inline-flex items-center justify-center gap-2 bg-slate-50 hover:bg-secondary/10 border border-slate-200 hover:border-secondary text-primary font-bold text-xs py-3 px-4 rounded-2xl transition active:scale-[0.98]"
          >
            <i data-lucide="users" class="w-4 h-4 text-primary"></i>
            <span>SWITCH TO REPRESENTATIVE LOGIN</span>
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <p class="text-center text-slate-400 text-xs py-4">
    &copy; 2026 Bhikharam Chandmal. System Portal.
  </p>

  <!-- Script logic -->
  <script type="module">
    import { db, ref, set, DB_ROOT, showToast, showLoader, hideLoader, checkAdminSession } from "./firebase-config.js";

    document.addEventListener("DOMContentLoaded", async () => {
      // Create SVG Icons
      lucide.createIcons();

      // Check if admin is already logged in
      showLoader();
      try {
        const session = await checkAdminSession();
        if (session) {
          window.location.href = "admin_dashboard.html";
          return;
        }
      } catch (err) {
        console.error(err);
      } finally {
        hideLoader();
      }

      const passwordInput = document.getElementById("admin-password");
      const togglePasswordBtn = document.getElementById("toggle-password");
      const eyeIcon = document.getElementById("eye-icon");
      const loginForm = document.getElementById("admin-login-form");

      // Password visibility toggle
      togglePasswordBtn.addEventListener("click", () => {
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.setAttribute("data-lucide", "eye-off");
        } else {
          passwordInput.type = "password";
          eyeIcon.setAttribute("data-lucide", "eye");
        }
        lucide.createIcons();
      });

      // Handle Submit
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const pwd = passwordInput.value.trim();

        if (pwd === "123456") {
          showLoader();
          try {
            const adminSessionRef = ref(db, `${DB_ROOT}/sessions/admin`);
            await set(adminSessionRef, {
              login: true,
              email: "amitdaskishanganj@gmail.com",
              loginAt: Date.now()
            });
            showToast("Admin login successful!", "success");
            setTimeout(() => {
              window.location.href = "admin_dashboard.html";
            }, 800);
          } catch (error) {
            console.error("Session Create Error:", error);
            showToast("Failed to establish session: " + error.message, "error");
          } finally {
            hideLoader();
          }
        } else {
          showToast("Incorrect password. Please try again.", "error");
        }
      });
    });
  </script>
</body>
</html>
